# DNS服务器配置
# 基础目录，默认当前目录
base_dir: "."

# 下载配置解析域名时使用的递归 DNS（Do53，host:port）。
# 本服务刚启动时系统 resolv 可能不可用（如指向 [::1]:53），此处显式指定可避免依赖本机解析。
# 留空则使用下方 upstream 中非回环地址；若仍为空则内置 223.5.5.5 / 8.8.8.8 / 1.1.1.1。
bootstrap_dns:
  - "223.5.5.5:53"
  - "8.8.8.8:53"

server:
  # 监听地址
  listen: ":5355"
  # 域名的默认 TTL 时间（秒）
  domain_ttl: 60
  # 本地+海外并发查询等待窗口（秒）
  concurrent_timeout: 6
  # 日志时区
  log_timezone: "Asia/Shanghai"
  # 日志等级: debug, info, warn, error, fatal
  log_level: "info"
  # 日志目录路径（支持相对/绝对路径）
  log_path: "./log"
  # 缓存目录路径（支持相对/绝对路径）
  cache_path: "./cache"
  # 缓存大小
  cache_size: 10000

# 上游DNS服务器
upstream:
  servers:
    # 本地 DNS 服务器（国内）
    local:
      - "223.5.5.5:53"      # 阿里云DNS
      #- "223.6.6.6:53"      # 阿里云DNS备用
      #- "114.114.114.114:53" # 114DNS
    
    # 海外 DNS 服务器
    overseas:
      - "8.8.8.8:53"        # Google DNS
      - "8.8.4.4:53"        # Google DNS备用
      - "1.1.1.1:53"        # Cloudflare DNS
      
  # 默认所有域名使用本地和海外 DNS 上游服务器

  # 只使用本地 DNS 服务器
  # 外国域名写入这里的话，会走本地 DNS
  local_only:
    - "ntp.org"
  # 只使用海外 DNS 上游服务器
  overseas_only:
    - "googlevideo.com"
    - "ytimg.com"
    - "ggpht.com"

# 所在国域名列表配置
# 只使用本地 DNS 上游服务器
local_domains:
  # 数据源URL
  source_url: "https://raw.githubusercontent.com/wuchang1123/cn-dns-conf/refs/heads/main/out/dnsmasq-china.conf"
  # 本地文件路径
  file_path: "./data/china_domains.txt"
  # 更新间隔（小时）
  update_interval: 24

# 重点嫌疑域名
key_suspect:
  - domains:
    - "google.com"
    - "youtube.com"
    - "facebook.com"
    - "twitter.com"
    - "instagram.com"
    - "linkedin.com"
    - "github.com"
    - "gitlab.com"
  

# 病毒识别系统配置
poison_check:
  # 是否启用
  enabled: true
  # TLS连接超时（秒）
  tls_timeout: 5
  # 并发校验数量
  concurrent_checks: 10
  # 校验端口
  tls_port: 443
  # 是否启用ASN判断
  asn_enabled: true
  asn_file_path: "./data/domain_asn.yaml"