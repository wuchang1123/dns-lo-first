# DNS服务器配置
# 基础目录，默认当前目录
base_dir: "."

server:
  # 监听地址
  listen: ":5355"
  # 缓存大小
  cache_size: 10000
  # 日志时区
  log_timezone: "Asia/Shanghai"
  # 日志等级: debug, info, warn, error, fatal
  log_level: "info"

# 上游DNS服务器
upstream:
  # 本地DNS服务器（国内）
  local:
    - "223.5.5.5:53"      # 阿里云DNS
    #- "223.6.6.6:53"      # 阿里云DNS备用
    #- "114.114.114.114:53" # 114DNS
  
  # 海外DNS服务器
  overseas:
    - "8.8.8.8:53"        # Google DNS
    - "8.8.4.4:53"        # Google DNS备用
    - "1.1.1.1:53"        # Cloudflare DNS

  # 本地出口地址（网卡地址），留空则使用默认路由
  local_bind_addr: ""
  # 海外出口地址（网卡地址），留空则使用默认路由
  overseas_bind_addr: ""

# 所在国域名列表配置
local_domains:
  # 数据源URL
  source_url: "https://raw.githubusercontent.com/wuchang1123/cn-dns-conf/refs/heads/main/out/dnsmasq-china.conf"
  # 本地文件路径
  file_path: "./data/china_domains.txt"
  # 更新间隔（小时）
  update_interval: 24
  # 自定义域名列表
  custom:
    - "baidu.com"
    - "alibaba.com"
    - "tencent.com"
    - "jd.com"
    - "taobao.com"
    - "tmall.com"
  overpass:
    - "googlevideo.com"
    - "ytimg.com"
    - "ggpht.com"

# 判毒系统配置
poison_check:
  # 是否启用
  enabled: true
  # TLS连接超时（秒）
  tls_timeout: 5
  # 并发校验数量
  concurrent_checks: 10
  # 校验端口
  tls_port: 443
  # 缓存刷新间隔（分钟），0表示禁用
  cache_refresh_interval: 30
  # 缓存过期时间（分钟）
  cache_ttl: 32