name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o bin/lo-first-linux-amd64 ./cmd/lo-first/

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o bin/lo-first-linux-arm64 ./cmd/lo-first/

      - name: Build Linux ARMv7
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o bin/lo-first-linux-armv7 ./cmd/lo-first/

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o bin/lo-first-darwin-arm64 ./cmd/lo-first/

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o bin/lo-first-darwin-amd64 ./cmd/lo-first/

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries
          path: bin/