name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o bin/dns-server-linux-amd64 ./cmd/dns-server/

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o bin/dns-server-linux-arm64 ./cmd/dns-server/

      - name: Build Linux ARMv7
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o bin/dns-server-linux-armv7 ./cmd/dns-server/

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o bin/dns-server-darwin-arm64 ./cmd/dns-server/

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o bin/dns-server-darwin-amd64 ./cmd/dns-server/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/