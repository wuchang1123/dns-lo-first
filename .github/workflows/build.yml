name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 go build -o bin/lo-first-linux-amd64 ./cmd/lo-first/

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 go build -o bin/lo-first-linux-arm64 ./cmd/lo-first/

      - name: Build Linux ARMv7
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o bin/lo-first-linux-armv7 ./cmd/lo-first/

      - name: Build macOS ARM64
        run: GOOS=darwin GOARCH=arm64 go build -o bin/lo-first-darwin-arm64 ./cmd/lo-first/

      - name: Build macOS AMD64
        run: GOOS=darwin GOARCH=amd64 go build -o bin/lo-first-darwin-amd64 ./cmd/lo-first/

      - name: Commit binaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add bin/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update binaries [skip ci]"
            git push
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: binaries
          path: bin/